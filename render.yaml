services:
  - type: web
    name: mirrormind-api
    env: node
    buildCommand: npm install && npm run build --workspace api
    startCommand: npm run start --workspace api
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: mirrormind-ml
    env: python
    buildCommand: pip install -r ml/requirements.txt
    startCommand: uvicorn ml.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONPATH
        value: .
