services:
  # API Server (Node.js)
  - type: web
    name: mirrormind-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build --workspace=api
    startCommand: npm run start --workspace=api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mirrormind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mirrormind-redis
          property: connectionString
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: SIWE_DOMAIN
        sync: false
      - key: OG_RPC_URL
        sync: false
      - key: OG_STORAGE_RPC
        sync: false
      - key: OG_COMPUTE_URL
        sync: false
      - key: ML_SERVICE_GRPC_URL
        value: http://mirrormind-ml:50051

  # ML Microservice (Python)
  - type: web
    name: mirrormind-ml
    runtime: python
    plan: starter
    buildCommand: pip install -r ml/requirements.txt
    startCommand: python ml/main.py
    envVars:
      - key: PORT
        value: 8000
      - key: GRPC_PORT
        value: 50051
      - key: OG_STORAGE_RPC
        sync: false
      - key: OG_COMPUTE_URL
        sync: false

  # Redis (Key-Value)
  - type: keyvalue
    name: mirrormind-redis
    plan: starter
    ipAllowList: [] # Only allow internal connections

databases:
  - name: mirrormind-db
    plan: starter
    databaseName: mirrormind
    user: mirrormind
